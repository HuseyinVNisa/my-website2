<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prensesi Bul - Pocoyo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Sayaç -->
        <div class="counter-container" id="counterContainer">
            <div class="counter-text">
                <span class="counter-label">Bulunan Prenses:</span>
                <span class="counter-number" id="counterNumber">0</span>
                <span class="counter-total">/50</span>
            </div>
        </div>

        <!-- Ana Buton -->
        <div class="button-container" id="buttonContainer">
            <button class="main-button" id="mainButton">
                Tek ve en güzel prensesi bulmak istiyosan butona bas 50 kere 
            </button>
        </div>

        <!-- Motivasyon Mesajları -->
        <div class="motivation-message" id="motivationMessage"></div>

        <!-- Final Ekranı -->
        <div class="final-screen" id="finalScreen" style="display: none;">
            <div class="glow-effect" id="glowEffect"></div>
            <div class="photo-frame">
                <img src="resim1.png" alt="Prenses" class="princess-photo" id="princessPhoto">
            </div>
            <div class="final-text" id="finalText">
                İşte buldun şapşik! Hemi de tek ve en tatliş prensesi.Bu gülüşün hiç eksik olmasın .
            </div>
            <div class="whatsapp-container">
                <a href="https://wa.me/YOUR_PHONE_NUMBER" class="whatsapp-button" target="_blank" id="whatsappButton">
                    <span class="heart">❤️</span>
                    <span class="button-text"></span>
                </a>
            </div>
        </div>
    </div>

    <!-- Animasyon Container -->
    <div class="animation-container" id="animationContainer"></div>

    <!-- Konfeti Canvas -->
    <canvas id="confettiCanvas"></canvas>

    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
